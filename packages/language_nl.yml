      - multiply: 1.609344
    unit_of_measurement: km
  max_soc:
    name: "Oplaadlimiet"
  max_amps:
    name: "Maximale laadstroom"
  mins_to_limit:
    name: "Sessieduur"
  battery_range:
    name: "Reikwijdte"
    filters:
      - multiply: 1.609344
    unit_of_measurement: km
  charging_state:
    name: "Laadstatus"
  last_update:
    name: "Laatste update"
  is_climate_on:
    name: "Climate control"
  internal_temp:
    name: "Temperatuur interieur"
  external_temp:
    name: "Buitentemperatuur"
  windows_state:
    name: "Ramen"
  tpms_pressure_fl:
    name: "Bandendruk linksvoor"
  tpms_pressure_fr:
    name: "Bandendruk rechtsvoor"
  tpms_pressure_rl:
    name: "Bandendruk linksachter"
  tpms_pressure_rr:
    name: "Bandendruk rechtsachter"
