# including this file will regionalize the entities to Dutch/Flemisch:
# - localize all names to Dutch terminology
# - use km. instead of mi for distance units by default


tesla_ble_vehicle:
  is_asleep:
    name: "In slaapstand"
  is_user_present:
    name: "Persoon aanwezig"
  is_unlocked:
    name: "Ontgrendeld"
  is_charge_flap_open:
    icon: mdi:ev-plug-ccs2
    name: "Laadpoort geopend"
  is_boot_open:
    name: "Bagageruimte achter"
  is_frunk_open:
    name: "Bagageruimte voor"
  shift_state:
    name: "Rijmodus"
  defrost_state:
    name: "Ontdooien"
  charge_state:
    name: "Laadstatus"
  odometer:
    name: "Kilometerstand"
    filters:
      - multiply: 1.609344
    unit_of_measurement: km
  charge_current:
    name: "Laadstroom"
  charge_voltage:
    name: "Laadspanning"
  charge_power:
    name: "Laadvermogen"
  charge_energy_added:
    name: "Toegevoegde energie"
  charge_distance_added:
    name: "Toegevoegde rijafstand"
